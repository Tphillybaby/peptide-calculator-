<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting... | PeptideLog</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #94a3b8; }
  </style>
  <!--
    SPA Fallback Page
    Vercel serves this 404.html when the edge routing fails to match a route.

    CRITICAL RULES:
    1. OAuth callbacks (/callback?code=...) MUST redirect to /callback — NOT to /
       The React Router renders <AuthCallback> only for the /callback route.
    2. We MUST NOT call window.location.reload() — that creates infinite loops
       and invalidates the single-use OAuth ?code= parameter.
    3. We store the full intended URL in sessionStorage so App.jsx can pick it up
       and perform a client-side navigation (no full reload).
  -->
  <script>
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var fullPath = path + search + hash;

      // --- Auth callback: preserve /callback + query params ---
      // The Google OAuth redirect lands as /callback?code=xxx&...
      // We must redirect to / so the SPA loads, then the SPA navigates to
      // /callback with the code intact — Supabase then auto-exchanges it.
      if (path === '/callback' || path === '/callback/') {
        // Store the FULL callback URL (path + code params) so App.jsx restores it
        sessionStorage.setItem('spa_redirect', fullPath);
        // Redirect to root — App.jsx will navigate back to /callback client-side
        window.location.replace('/');
        return;
      }

      // --- Magic link / password reset callbacks ---
      if (path === '/update-password' || path === '/reset-password') {
        sessionStorage.setItem('spa_redirect', fullPath);
        window.location.replace('/');
        return;
      }

      // --- All other SPA routes: retry once, then fall back to home ---
      // This handles transient Vercel edge 404s (cold-start race conditions).
      var retryKey = 'spa_retry_' + path;
      var retried = sessionStorage.getItem(retryKey);
      if (!retried) {
        // First failure: retry the same URL directly (no reload loop risk
        // because we only do this once per path)
        sessionStorage.setItem(retryKey, '1');
        sessionStorage.setItem('spa_redirect', fullPath);
        window.location.replace('/');
      } else {
        // Already retried — the path truly doesn't exist; go to home
        sessionStorage.removeItem(retryKey);
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirecting...</p>
  </div>
</body>
</html>
